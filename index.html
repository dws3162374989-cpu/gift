<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#160f10">
  <title>方景源小朋友的快乐相册</title>
  <link rel="preload" href="assets/gallery/photo-01.jpg" as="image">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="story" aria-label="方景源小朋友的快乐相册">
      <div class="topbar">
        <button type="button" class="signal" data-lucky>今日幸运准备中</button>
        <div class="top-actions">
          <button type="button" class="icon-button" data-music aria-label="开启音乐">♪</button>
        </div>
      </div>

      <div class="viewer" data-viewer>
        <figure class="photo-stage" data-card>
          <img data-photo src="assets/gallery/photo-01.jpg" alt="相册照片">
          <figcaption class="caption">
            <span class="kicker" data-index>第 01 张</span>
            <strong data-title>快乐载入中</strong>
            <p data-caption>正在把今天的宠溺摆到你面前。</p>
          </figcaption>
        </figure>
      </div>

      <div class="side-rail" aria-label="照片切换">
        <button type="button" class="rail-button" data-prev aria-label="上一张">‹</button>
        <button type="button" class="rail-button" data-next aria-label="下一张">›</button>
      </div>

      <div class="bottom-dock" aria-label="互动按钮">
        <button type="button" class="dock-button primary" data-next>下一张</button>
        <button type="button" class="dock-button" data-autoplay>自动</button>
        <button type="button" class="dock-button" data-sweet>甜话</button>
      </div>

      <div class="progress" aria-label="照片进度">
        <div class="progress-bar" data-progress></div>
      </div>

      <div class="filmstrip" data-thumbs aria-label="照片缩略图"></div>
    </section>

    <section class="note" aria-label="隐藏留言">
      <p class="eyebrow">Hidden note</p>
      <h2>本相册使用说明</h2>
      <p>开心的时候多翻几张，不开心的时候也多翻几张。方景源小朋友拥有本页面最高优先级，被哄、被夸、被偏爱都无需排队。</p>
      <div class="badges">
        <span>本卡最终解释权归方景源所有</span>
        <span>不许偷偷皱眉太久</span>
        <span>想被哄就点下一张</span>
      </div>
    </section>
  </main>

  <div class="page-wipe" data-wipe aria-hidden="true"><span>♥</span></div>
  <div class="secret-card" data-secret-card aria-hidden="true">
    <p>长按彩蛋</p>
    <strong data-secret-title>偷偷留言</strong>
    <span data-secret-text>这一张也被我认真喜欢着。</span>
  </div>
  <div class="toast" data-toast role="status" aria-live="polite"></div>
  <canvas id="confetti" aria-hidden="true"></canvas>
  <script src="script.js"></script>
</body>
</html>
